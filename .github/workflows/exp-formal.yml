name: Exp.sol Formal Check

on:
  push:
    branches:
      - master
    paths:
      - src/vendor/Exp.sol
      - src/wrappers/ExpWrapper.sol
      - formal/exp/**
      - formal/common/**
      - formal/yul/**
      - foundry.toml
      - remappings.txt
      - .github/workflows/exp-formal.yml
  pull_request:
    paths:
      - src/vendor/Exp.sol
      - src/wrappers/ExpWrapper.sol
      - formal/exp/**
      - formal/common/**
      - formal/yul/**
      - foundry.toml
      - remappings.txt
      - .github/workflows/exp-formal.yml

jobs:
  exp-formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install pinned Lean toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/917c18d0ad52f649c2603dc8b973f5b9fa5f8f43/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          LEAN_TOOLCHAIN="$(cat formal/exp/ExpProof/lean-toolchain)"
          "$HOME/.elan/bin/elan" toolchain install "$LEAN_TOOLCHAIN"
          "$HOME/.elan/bin/elan" default "$LEAN_TOOLCHAIN"

      - name: Restore Lean build cache
        uses: actions/cache@v4
        with:
          path: |
            formal/yul/.lake/build
            formal/yul/.lake/packages/*/.lake/build
            lib/EVMYulLean/.lake/build
            formal/common/.lake/build
            formal/exp/ExpProof/.lake/build
          key: ${{ runner.os }}-exp-formal-lean-${{ hashFiles('formal/yul/lean-toolchain', 'formal/yul/lakefile.toml', 'formal/yul/lake-manifest.json', 'formal/common/lakefile.toml', 'formal/common/lake-manifest.json', 'formal/common/**/*.lean', 'formal/exp/ExpProof/lakefile.toml', 'formal/exp/ExpProof/lake-manifest.json', 'formal/yul/FormalYul/**/*.lean', 'formal/exp/ExpProof/**/*.lean', 'lib/EVMYulLean/**/*.lean') }}
          restore-keys: |
            ${{ runner.os }}-exp-formal-lean-
            ${{ runner.os }}-formal-lean-

      - name: Install solc 0.8.34
        run: forge build -- src/chains/Mainnet/TakerSubmitted.sol
        env:
          FOUNDRY_SOLC_VERSION: 0.8.34

      - name: Fetch Mathlib cache
        working-directory: formal/yul
        run: |
          # Mathlib's `cache get` fetches the ProofWidgets cloud release, then
          # deletes its `lib`/`ir` outputs and fails if they are missing. Fetch
          # the release and ensure those directories exist before it runs.
          lake build proofwidgets:release
          mkdir -p \
            .lake/packages/proofwidgets/.lake/build/lib \
            .lake/packages/proofwidgets/.lake/build/ir
          lake exe cache get

      - name: Build Yul importer
        working-directory: formal/yul
        run: lake build FormalYul.Preservation yul_importer

      - name: Generate EVMYulLean artifacts from compiled ExpWrapper Yul IR
        run: |
          ./formal/yul/generate_from_forge.sh \
            exp \
            src/wrappers/ExpWrapper.sol:ExpWrapper \
            formal/exp/ExpProof/ExpProof/ExpYul.lean \
            0.8.34

      - name: Fetch proof dependency cache
        working-directory: formal/exp/ExpProof
        run: |
          # Mathlib's `cache get` fetches the ProofWidgets cloud release, then
          # deletes its `lib`/`ir` outputs and fails if they are missing. Fetch
          # the release and ensure those directories exist before it runs.
          lake build proofwidgets:release
          mkdir -p \
            .lake/packages/proofwidgets/.lake/build/lib \
            .lake/packages/proofwidgets/.lake/build/ir
          lake exe cache get

      - name: Build Exp proof package
        working-directory: formal/exp/ExpProof
        run: lake build
