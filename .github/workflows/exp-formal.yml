name: Exp.sol Formal Check

on:
  push:
    branches:
      - master
    paths:
      - src/utils/Panic.sol
      - src/vendor/Exp.sol
      - src/vendor/Ln.sol
      - src/wrappers/ExpWrapper.sol
      - src/wrappers/LnWrapper.sol
      - formal/exp/**
      - formal/ln/**
      - formal/common/**
      - formal/yul/**
      - foundry.toml
      - remappings.txt
      - .gitmodules
      - lib/EVMYulLean
      - .github/actions/setup-formal/**
      - .github/actions/fetch-lean-cache/**
      - .github/workflows/exp-formal.yml
      - .github/actions/build-ln-proof/action.yml
  pull_request:
    paths:
      - src/utils/Panic.sol
      - src/vendor/Exp.sol
      - src/vendor/Ln.sol
      - src/wrappers/ExpWrapper.sol
      - src/wrappers/LnWrapper.sol
      - formal/exp/**
      - formal/ln/**
      - formal/common/**
      - formal/yul/**
      - foundry.toml
      - remappings.txt
      - .gitmodules
      - lib/EVMYulLean
      - .github/actions/setup-formal/**
      - .github/actions/fetch-lean-cache/**
      - .github/workflows/exp-formal.yml
      - .github/actions/build-ln-proof/action.yml

jobs:
  exp-formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up the formal toolchain
        uses: ./.github/actions/setup-formal
        with:
          lean-toolchain-files: formal/exp/ExpProof/lean-toolchain
          cache-name: exp-formal
          cache-paths: |
            formal/common/.lake/build
            formal/ln/LnProof/.lake/build
            formal/exp/ExpProof/.lake/build
          cache-hash-globs: |
            formal/common/lakefile.toml
            formal/common/lake-manifest.json
            formal/common/**/*.lean
            formal/ln/LnProof/lakefile.toml
            formal/ln/LnProof/lake-manifest.json
            formal/ln/LnProof/**/*.lean
            formal/exp/ExpProof/lakefile.toml
            formal/exp/ExpProof/lake-manifest.json
            formal/exp/ExpProof/**/*.lean

      - name: Generate EVMYulLean artifacts from compiled ExpWrapper Yul IR
        run: |
          ./formal/yul/generate_from_forge.sh \
            exp \
            src/wrappers/ExpWrapper.sol:ExpWrapper \
            formal/exp/ExpProof/ExpProof/ExpYul.lean \
            0.8.34

      - name: Build Ln proof dependency
        uses: ./.github/actions/build-ln-proof

      - name: Fetch proof dependency cache
        uses: ./.github/actions/fetch-lean-cache
        with:
          working-directory: formal/exp/ExpProof

      - name: Generate Lean certificate artifacts
        working-directory: formal/exp/ExpProof
        run: |
          lake build ExpProof.Floor.CertDefsV ExpProof.Floor.GranPieces Common.Foundation.KroneckerShift
          lake env lean GenExpVLit.lean

      - name: Build Exp proof package
        working-directory: formal/exp/ExpProof
        run: lake build
