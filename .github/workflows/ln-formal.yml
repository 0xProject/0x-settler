name: Ln.sol Formal Check

on:
  push:
    branches:
      - master
    paths:
      - src/vendor/Ln.sol
      - src/wrappers/LnWrapper.sol
      - formal/ln/**
      - formal/common/**
      - formal/yul/**
      - foundry.toml
      - remappings.txt
      - .gitmodules
      - lib/EVMYulLean
      - .github/actions/setup-formal/**
      - .github/actions/fetch-lean-cache/**
      - .github/workflows/ln-formal.yml
      - .github/actions/build-ln-proof/action.yml
  pull_request:
    paths:
      - src/vendor/Ln.sol
      - src/wrappers/LnWrapper.sol
      - formal/ln/**
      - formal/common/**
      - formal/yul/**
      - foundry.toml
      - remappings.txt
      - .gitmodules
      - lib/EVMYulLean
      - .github/actions/setup-formal/**
      - .github/actions/fetch-lean-cache/**
      - .github/workflows/ln-formal.yml
      - .github/actions/build-ln-proof/action.yml

jobs:
  ln-formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up the formal toolchain
        uses: ./.github/actions/setup-formal
        with:
          lean-toolchain-files: formal/ln/LnProof/lean-toolchain
          cache-name: ln-formal
          cache-paths: |
            formal/common/.lake/build
            formal/ln/LnProof/.lake/build
          cache-hash-globs: |
            formal/common/lakefile.toml
            formal/common/lake-manifest.json
            formal/common/**/*.lean
            formal/ln/LnProof/lakefile.toml
            formal/ln/LnProof/lake-manifest.json
            formal/ln/LnProof/**/*.lean

      - name: Build Ln proof package
        uses: ./.github/actions/build-ln-proof
