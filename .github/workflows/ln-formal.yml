name: Ln.sol Formal Check

on:
  push:
    branches:
      - master
    paths:
      - src/vendor/Ln.sol
      - src/wrappers/LnWrapper.sol
      - formal/ln/**
      - formal/yul/**
      - test/0.8.34/Ln.t.sol
      - .github/workflows/ln-formal.yml
  pull_request:
    paths:
      - src/vendor/Ln.sol
      - src/wrappers/LnWrapper.sol
      - formal/ln/**
      - formal/yul/**
      - test/0.8.34/Ln.t.sol
      - .github/workflows/ln-formal.yml

jobs:
  ln-formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install pinned Lean toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/917c18d0ad52f649c2603dc8b973f5b9fa5f8f43/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          LEAN_TOOLCHAIN="$(cat formal/ln/LnProof/lean-toolchain)"
          "$HOME/.elan/bin/elan" toolchain install "$LEAN_TOOLCHAIN"
          "$HOME/.elan/bin/elan" default "$LEAN_TOOLCHAIN"

      - name: Restore Lean build cache
        uses: actions/cache@v4
        with:
          path: |
            formal/yul/.lake/build
            formal/yul/.lake/packages/*/.lake/build
            lib/EVMYulLean/.lake/build
            formal/ln/LnProof/.lake/build
          key: ${{ runner.os }}-ln-formal-lean-${{ hashFiles('formal/yul/lean-toolchain', 'formal/yul/lakefile.toml', 'formal/yul/lake-manifest.json', 'formal/ln/LnProof/lakefile.toml', 'formal/ln/LnProof/lake-manifest.json', 'formal/yul/FormalYul/**/*.lean', 'formal/ln/LnProof/**/*.lean', 'lib/EVMYulLean/**/*.lean') }}
          restore-keys: |
            ${{ runner.os }}-ln-formal-lean-
            ${{ runner.os }}-formal-lean-

      - name: Install solc 0.8.34
        run: forge build -- src/chains/Mainnet/TakerSubmitted.sol
        env:
          FOUNDRY_SOLC_VERSION: 0.8.34

      - name: Fetch Mathlib cache
        working-directory: formal/yul
        run: lake exe cache get

      - name: Build Yul importer
        working-directory: formal/yul
        run: lake build FormalYul.Preservation yul_importer

      - name: Generate EVMYulLean artifacts from compiled LnWrapper Yul IR
        run: |
          ./formal/yul/generate_from_forge.sh \
            ln \
            src/wrappers/LnWrapper.sol:LnWrapper \
            formal/ln/LnProof/LnProof/LnYul.lean \
            0.8.34

      - name: Guard generated artifacts are untracked
        run: |
          test -z "$(git ls-files \
            formal/ln/LnProof/LnProof/LnYulRuntime.lean \
            formal/ln/LnProof/LnProof/LnYulProof.lean)"

      - name: Fetch proof dependency cache
        working-directory: formal/ln/LnProof
        run: lake exe cache get

      - name: Generate Lean certificate artifacts
        working-directory: formal/ln/LnProof
        run: |
          lake build LnProof.FloorCertDefs LnProof.KroneckerShift LnProof.FloorConsts
          lake env lean GenFloorCertLit.lean
          lake build LnProof.FloorCertLit
          lake env lean GenCover.lean
          lake env lean GenErr1.lean
          lake build LnProof.ErrorBoundCore
          lake env lean GenErrLit.lean

      # A green build certifies that the package compiles and that the AxiomCheck
      # `#guard_msgs` gate holds (the pinned theorems depend only on
      # [propext, Classical.choice, Quot.sound]). `lnWadToRayRuntimeCorrect` is
      # unconditional (the compiled `lnWadToRay` runtime is correct against the
      # `Real.log` spec); the wad-path discharge and the revert facts are still
      # in progress. See formal/ln/STATUS.md.
      - name: Build Ln proof package
        working-directory: formal/ln/LnProof
        run: lake build
