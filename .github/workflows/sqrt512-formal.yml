name: 512Math sqrt Formal Check

on:
  push:
    branches:
      - master
    paths:
      - src/utils/512Math.sol
      - src/utils/FastLogic.sol
      - src/utils/Panic.sol
      - src/utils/Ternary.sol
      - src/utils/UnsafeMath.sol
      - src/vendor/Clz.sol
      - src/vendor/Cbrt.sol
      - src/vendor/Sqrt.sol
      - src/wrappers/Sqrt512Wrapper.sol
      - formal/sqrt/**
      - formal/python/sqrt/**
      - formal/yul/**
      - foundry.toml
      - remappings.txt
      - .gitmodules
      - lib/EVMYulLean
      - .github/actions/setup-formal/**
      - .github/actions/fetch-lean-cache/**
      - .github/workflows/sqrt512-formal.yml
  pull_request:
    paths:
      - src/utils/512Math.sol
      - src/utils/FastLogic.sol
      - src/utils/Panic.sol
      - src/utils/Ternary.sol
      - src/utils/UnsafeMath.sol
      - src/vendor/Clz.sol
      - src/vendor/Cbrt.sol
      - src/vendor/Sqrt.sol
      - src/wrappers/Sqrt512Wrapper.sol
      - formal/sqrt/**
      - formal/python/sqrt/**
      - formal/yul/**
      - foundry.toml
      - remappings.txt
      - .gitmodules
      - lib/EVMYulLean
      - .github/actions/setup-formal/**
      - .github/actions/fetch-lean-cache/**
      - .github/workflows/sqrt512-formal.yml

jobs:
  sqrt512-formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up the formal toolchain
        uses: ./.github/actions/setup-formal
        with:
          lean-toolchain-files: |
            formal/sqrt/Sqrt512Proof/lean-toolchain
            formal/sqrt/SqrtProof/lean-toolchain
          cache-name: sqrt512-formal
          cache-paths: |
            formal/sqrt/SqrtProof/.lake/build
            formal/sqrt/Sqrt512Proof/.lake/build
          cache-hash-globs: |
            formal/sqrt/SqrtProof/lakefile.toml
            formal/sqrt/SqrtProof/lake-manifest.json
            formal/sqrt/Sqrt512Proof/lakefile.toml
            formal/sqrt/Sqrt512Proof/lake-manifest.json
            formal/sqrt/SqrtProof/**/*.lean
            formal/sqrt/Sqrt512Proof/**/*.lean

      - name: Generate 512-bit EVMYulLean artifacts from compiled Sqrt512Wrapper Yul IR
        run: |
          ./formal/yul/generate_from_forge.sh \
            sqrt512 \
            src/wrappers/Sqrt512Wrapper.sol:Sqrt512Wrapper \
            formal/sqrt/Sqrt512Proof/Sqrt512Proof/Sqrt512Yul.lean \
            0.8.34

      - name: Generate 256-bit sqrt finite certificate (SqrtProof dependency) from Python generator
        run: |
          python3 formal/python/sqrt/generate_sqrt_cert.py \
            --output formal/sqrt/SqrtProof/SqrtProof/FiniteCert.lean

      - name: Fetch proof dependency cache
        uses: ./.github/actions/fetch-lean-cache
        with:
          working-directory: formal/sqrt/Sqrt512Proof

      - name: Build Sqrt512 proof package
        working-directory: formal/sqrt/Sqrt512Proof
        run: lake build
