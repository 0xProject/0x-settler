name: Formal Checks

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

env:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  route:
    name: Select formal checks
    runs-on: ubuntu-latest
    outputs:
      any: ${{ steps.route.outputs.any }}
      common: ${{ steps.route.outputs.common }}
      cbrt: ${{ steps.route.outputs.cbrt }}
      cbrt512: ${{ steps.route.outputs.cbrt512 }}
      sqrt: ${{ steps.route.outputs.sqrt }}
      sqrt512: ${{ steps.route.outputs.sqrt512 }}
      ln: ${{ steps.route.outputs.ln }}
      exp: ${{ steps.route.outputs.exp }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Select affected formal packages
        id: route
        uses: ./.github/actions/route-formal
        with:
          event-name: ${{ github.event_name }}
          before-sha: ${{ github.event.before }}
          base-sha: ${{ github.event.pull_request.base.sha }}
          head-sha: ${{ github.event.pull_request.head.sha || github.sha }}

  base:
    name: Publish formal base caches
    needs: route
    if: needs.route.outputs.any == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
          persist-credentials: false

      - name: Build and publish the formal base
        uses: ./.github/actions/setup-formal
        with:
          publish: "true"
          lean-toolchain-files: |
            formal/yul/lean-toolchain
            lib/EVMYulLean/lean-toolchain
            formal/common/lean-toolchain
            formal/ln/LnProof/lean-toolchain
            formal/exp/ExpProof/lean-toolchain
            formal/cbrt/CbrtProof/lean-toolchain
            formal/cbrt/Cbrt512Proof/lean-toolchain
            formal/sqrt/SqrtProof/lean-toolchain
            formal/sqrt/Sqrt512Proof/lean-toolchain

  common:
    name: Common formal check
    needs:
      - route
      - base
    if: needs.route.outputs.common == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
          persist-credentials: false

      - name: Restore the formal base
        uses: ./.github/actions/setup-formal
        with:
          publish: "false"
          lean-toolchain-files: |
            formal/common/lean-toolchain
            formal/yul/lean-toolchain
            lib/EVMYulLean/lean-toolchain

      - name: Restore Common package cache
        id: common-cache
        uses: ./.github/actions/cache-formal-package
        with:
          cache-name: common
          publish: "true"
          cache-path: formal/common/.lake/build
          dependency-hash-globs: |
            formal/yul/lean-toolchain
            formal/yul/lakefile.toml
            formal/yul/lake-manifest.json
            formal/yul/FormalYul.lean
            formal/yul/YulImporter.lean
            formal/yul/FormalYul/**/*.lean
            lib/EVMYulLean/lean-toolchain
            lib/EVMYulLean/lakefile.lean
            lib/EVMYulLean/lake-manifest.json
            lib/EVMYulLean/**/*.lean
          source-hash-globs: |
            formal/common/lean-toolchain
            formal/common/lakefile.toml
            formal/common/lake-manifest.json
            formal/common/Common.lean
            formal/common/Common/**/*.lean
            .github/actions/build-common-proof/**

      - name: Build Common package after a cache miss
        if: steps.common-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/build-common-proof

  cbrt:
    name: Cbrt.sol formal check
    needs:
      - route
      - base
    if: needs.route.outputs.cbrt == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
          persist-credentials: false

      - name: Restore the formal base
        uses: ./.github/actions/setup-formal
        with:
          publish: "false"
          lean-toolchain-files: |
            formal/cbrt/CbrtProof/lean-toolchain
            formal/yul/lean-toolchain
            lib/EVMYulLean/lean-toolchain

      - name: Restore Cbrt package cache
        id: cbrt-cache
        uses: ./.github/actions/cache-formal-package
        with:
          cache-name: cbrt
          publish: "true"
          cache-path: |
            formal/cbrt/CbrtProof/.lake/build
            formal/cbrt/CbrtProof/CbrtProof/FiniteCert.lean
            formal/cbrt/CbrtProof/CbrtProof/CbrtYulRuntime.lean
            formal/cbrt/CbrtProof/CbrtProof/CbrtYulProof.lean
          dependency-hash-globs: |
            formal/yul/lean-toolchain
            formal/yul/lakefile.toml
            formal/yul/lake-manifest.json
            formal/yul/FormalYul.lean
            formal/yul/YulImporter.lean
            formal/yul/FormalYul/**/*.lean
            lib/EVMYulLean/lean-toolchain
            lib/EVMYulLean/lakefile.lean
            lib/EVMYulLean/lake-manifest.json
            lib/EVMYulLean/**/*.lean
          source-hash-globs: |
            formal/cbrt/CbrtProof/lean-toolchain
            formal/cbrt/CbrtProof/lakefile.toml
            formal/cbrt/CbrtProof/lake-manifest.json
            formal/cbrt/CbrtProof/**/*.lean
            formal/python/cbrt/**/*.py
            src/vendor/Cbrt.sol
            src/wrappers/CbrtWrapper.sol
            formal/yul/generate_from_forge.sh
            foundry.toml
            remappings.txt
            .gitmodules
            .github/actions/build-cbrt-proof/**
            .github/actions/check-generated-sources/**
            .github/actions/fetch-lean-cache/**

      - name: Build Cbrt proof package after a cache miss
        if: steps.cbrt-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/build-cbrt-proof

