name: Sqrt.sol Formal Check

on:
  push:
    branches:
      - master
    paths:
      - src/vendor/Sqrt.sol
      - src/wrappers/SqrtWrapper.sol
      - formal/sqrt/**
      - formal/yul/**
      - test/0.8.25/Sqrt.t.sol
      - .github/workflows/sqrt-formal.yml
  pull_request:
    paths:
      - src/vendor/Sqrt.sol
      - src/wrappers/SqrtWrapper.sol
      - formal/sqrt/**
      - formal/yul/**
      - test/0.8.25/Sqrt.t.sol
      - .github/workflows/sqrt-formal.yml

jobs:
  sqrt-formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install pinned Lean toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/917c18d0ad52f649c2603dc8b973f5b9fa5f8f43/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          LEAN_TOOLCHAIN="$(cat formal/sqrt/SqrtProof/lean-toolchain)"
          "$HOME/.elan/bin/elan" toolchain install "$LEAN_TOOLCHAIN"
          "$HOME/.elan/bin/elan" default "$LEAN_TOOLCHAIN"

      - name: Install solc 0.8.34
        run: forge build -- src/chains/Mainnet/TakerSubmitted.sol
        env:
          FOUNDRY_SOLC_VERSION: 0.8.34

      - name: Build Yul importer
        working-directory: formal/yul
        run: lake build yul_importer

      - name: Generate EVMYulLean artifacts from compiled SqrtWrapper Yul IR
        run: |
          ./formal/yul/generate_from_forge.sh \
            sqrt \
            src/wrappers/SqrtWrapper.sol:SqrtWrapper \
            formal/sqrt/SqrtProof/SqrtProof/SqrtYul.lean

      - name: Guard generated artifacts are untracked
        run: |
          test -z "$(git ls-files \
            formal/sqrt/SqrtProof/SqrtProof/SqrtYulRuntime.lean \
            formal/sqrt/SqrtProof/SqrtProof/SqrtYulProof.lean)"

      - name: Update Lake dependencies
        working-directory: formal/sqrt/SqrtProof
        run: lake update

      - name: Build generated Sqrt EVMYulLean artifacts
        working-directory: formal/sqrt/SqrtProof
        run: lake build SqrtProof.SqrtYulRuntime SqrtProof.SqrtYulProof
