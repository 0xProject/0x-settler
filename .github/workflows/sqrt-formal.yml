name: Sqrt.sol Formal Check

on:
  push:
    branches:
      - master
    paths:
      - src/vendor/Sqrt.sol
      - src/wrappers/SqrtWrapper.sol
      - formal/sqrt/**
      - formal/python/sqrt/**
      - formal/yul/**
      - foundry.toml
      - remappings.txt
      - .gitmodules
      - lib/EVMYulLean
      - .github/actions/setup-formal/**
      - .github/actions/fetch-lean-cache/**
      - .github/workflows/sqrt-formal.yml
  pull_request:
    paths:
      - src/vendor/Sqrt.sol
      - src/wrappers/SqrtWrapper.sol
      - formal/sqrt/**
      - formal/python/sqrt/**
      - formal/yul/**
      - foundry.toml
      - remappings.txt
      - .gitmodules
      - lib/EVMYulLean
      - .github/actions/setup-formal/**
      - .github/actions/fetch-lean-cache/**
      - .github/workflows/sqrt-formal.yml

jobs:
  sqrt-formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up the formal toolchain
        uses: ./.github/actions/setup-formal
        with:
          lean-toolchain-files: formal/sqrt/SqrtProof/lean-toolchain
          cache-name: sqrt-formal
          cache-paths: |
            formal/sqrt/SqrtProof/.lake/build
          cache-hash-globs: |
            formal/sqrt/SqrtProof/lakefile.toml
            formal/sqrt/SqrtProof/lake-manifest.json
            formal/sqrt/SqrtProof/**/*.lean

      - name: Generate EVMYulLean artifacts from compiled SqrtWrapper Yul IR
        run: |
          ./formal/yul/generate_from_forge.sh \
            sqrt \
            src/wrappers/SqrtWrapper.sol:SqrtWrapper \
            formal/sqrt/SqrtProof/SqrtProof/SqrtYul.lean \
            0.8.34

      - name: Generate finite certificate from Python generator
        run: |
          python3 formal/python/sqrt/generate_sqrt_cert.py \
            --output formal/sqrt/SqrtProof/SqrtProof/FiniteCert.lean

      - name: Fetch proof dependency cache
        uses: ./.github/actions/fetch-lean-cache
        with:
          working-directory: formal/sqrt/SqrtProof

      - name: Build Sqrt proof package
        working-directory: formal/sqrt/SqrtProof
        run: lake build
