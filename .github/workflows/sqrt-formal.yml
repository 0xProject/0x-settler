name: Sqrt.sol Formal Check

on:
  push:
    branches:
      - master
    paths:
      - src/vendor/Sqrt.sol
      - src/wrappers/SqrtWrapper.sol
      - formal/sqrt/**
      - formal/python/sqrt/**
      - formal/yul/**
      - foundry.toml
      - remappings.txt
      - .gitmodules
      - lib/EVMYulLean
      - .github/workflows/sqrt-formal.yml
  pull_request:
    paths:
      - src/vendor/Sqrt.sol
      - src/wrappers/SqrtWrapper.sol
      - formal/sqrt/**
      - formal/python/sqrt/**
      - formal/yul/**
      - foundry.toml
      - remappings.txt
      - .gitmodules
      - lib/EVMYulLean
      - .github/workflows/sqrt-formal.yml

jobs:
  sqrt-formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install pinned Lean toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/917c18d0ad52f649c2603dc8b973f5b9fa5f8f43/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          LEAN_TOOLCHAIN="$(cat formal/sqrt/SqrtProof/lean-toolchain)"
          "$HOME/.elan/bin/elan" toolchain install "$LEAN_TOOLCHAIN"
          "$HOME/.elan/bin/elan" default "$LEAN_TOOLCHAIN"

      - name: Restore Lean build cache
        uses: actions/cache@v4
        with:
          path: |
            formal/yul/.lake/build
            formal/yul/.lake/packages/*/.lake/build
            lib/EVMYulLean/.lake/build
            formal/sqrt/SqrtProof/.lake/build
          key: ${{ runner.os }}-sqrt-formal-lean-${{ hashFiles('formal/yul/lean-toolchain', 'formal/yul/lakefile.toml', 'formal/yul/lake-manifest.json', 'formal/sqrt/SqrtProof/lakefile.toml', 'formal/sqrt/SqrtProof/lake-manifest.json', 'formal/yul/FormalYul/**/*.lean', 'formal/sqrt/SqrtProof/**/*.lean', 'lib/EVMYulLean/**/*.lean') }}
          restore-keys: |
            ${{ runner.os }}-sqrt-formal-lean-
            ${{ runner.os }}-formal-lean-

      - name: Install solc 0.8.34
        run: forge build -- src/wrappers/SqrtWrapper.sol
        env:
          FOUNDRY_SOLC_VERSION: 0.8.34

      - name: Fetch Mathlib cache
        working-directory: formal/yul
        run: |
          # Mathlib's `cache get` fetches the ProofWidgets cloud release, then
          # deletes its `lib`/`ir` outputs and fails if they are missing. Fetch
          # the release and ensure those directories exist before it runs.
          lake build proofwidgets:release
          mkdir -p \
            .lake/packages/proofwidgets/.lake/build/lib \
            .lake/packages/proofwidgets/.lake/build/ir
          lake exe cache get

      - name: Build Yul importer
        working-directory: formal/yul
        run: lake build FormalYul.Preservation yul_importer

      - name: Generate EVMYulLean artifacts from compiled SqrtWrapper Yul IR
        run: |
          ./formal/yul/generate_from_forge.sh \
            sqrt \
            src/wrappers/SqrtWrapper.sol:SqrtWrapper \
            formal/sqrt/SqrtProof/SqrtProof/SqrtYul.lean \
            0.8.34

      - name: Generate finite certificate from Python generator
        run: |
          python3 formal/python/sqrt/generate_sqrt_cert.py \
            --output formal/sqrt/SqrtProof/SqrtProof/FiniteCert.lean

      - name: Fetch proof dependency cache
        working-directory: formal/sqrt/SqrtProof
        run: |
          # Mathlib's `cache get` fetches the ProofWidgets cloud release, then
          # deletes its `lib`/`ir` outputs and fails if they are missing. Fetch
          # the release and ensure those directories exist before it runs.
          lake build proofwidgets:release
          mkdir -p \
            .lake/packages/proofwidgets/.lake/build/lib \
            .lake/packages/proofwidgets/.lake/build/ir
          lake exe cache get

      - name: Build Sqrt proof package
        working-directory: formal/sqrt/SqrtProof
        run: lake build
