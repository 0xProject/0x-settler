name: Build LnProof
description: >-
  Generate the LnWrapper EVMYulLean artifacts and certificate literals, then
  build the LnProof Lean package. Requires Foundry, solc 0.8.34, the pinned
  Lean toolchain, and a built formal/yul importer.

runs:
  using: composite
  steps:
    - name: Generate Ln EVMYulLean artifacts
      uses: ./.github/actions/check-generated-sources
      with:
        generated-paths: |
          formal/ln/LnProof/LnProof/LnYulRuntime.lean
          formal/ln/LnProof/LnProof/LnYulProof.lean
        generator: |
          ./formal/yul/generate_from_forge.sh \
            ln \
            src/wrappers/LnWrapper.sol:LnWrapper \
            formal/ln/LnProof/LnProof/LnYul.lean \
            0.8.34

    - name: Generate Ln certificates
      uses: ./.github/actions/check-generated-sources
      with:
        working-directory: formal/ln/LnProof
        generated-paths: LnProof/Cert
        generator: |
          for path in .lake/build/lib/lean/LnProof/Cert .lake/build/ir/LnProof/Cert; do
            if [[ -e "$path" ]]; then
              rm -r -- "$path"
            fi
          done
          lake build LnProof.Floor.CertDefs Common.Foundation.KroneckerShift LnProof.Floor.Consts Common.GenCover
          lake env lean GenFloorCertLit.lean
          lake build \
            LnProof.Cert.FloorCertGeUpLit \
            LnProof.Cert.FloorCertGeLoLit \
            LnProof.Cert.FloorCertLtUpLit \
            LnProof.Cert.FloorCertLtLoLit
          lake env lean GenCover.lean
          lake env lean GenErr1.lean
          lake build \
            LnProof.Error.Core.ExpMargin \
            LnProof.Error.Core.Budget \
            LnProof.Error.Core.BranchCertHardDefs
          lake env lean GenErrLit.lean
          lake env lean GenBranchCertHard.lean

    - name: Build Ln proof package
      shell: bash
      working-directory: formal/ln/LnProof
      run: |
        lake build LnProof.Cert.HardMantissaLtGap
        lake build
